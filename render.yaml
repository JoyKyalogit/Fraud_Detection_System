services:
  - type: web
    name: fraud-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn deploy:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: fraud-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: fraud-api
          property: hostport
